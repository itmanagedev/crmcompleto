version: '3.8'

services:
  # ==========================================
  # Frontend / Web App
  # ==========================================
  crm-web:
    container_name: crm-web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - crm-db
      - crm-redis
    networks:
      - crm-network
    restart: unless-stopped

  # ==========================================
  # Banco de Dados PostgreSQL 16
  # ==========================================
  crm-db:
    image: postgres:16-alpine
    container_name: crm-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_database}
    ports:
      - "5432:5432"
    volumes:
      - crm-db-data:/var/lib/postgresql/data
    networks:
      - crm-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Cache e Filas Redis 7
  # ==========================================
  crm-redis:
    image: redis:7-alpine
    container_name: crm-redis
    ports:
      - "6379:6379"
    volumes:
      - crm-redis-data:/data
    networks:
      - crm-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Interface de Administração do Banco
  # ==========================================
  crm-pgadmin:
    image: dpage/pgadmin4
    container_name: crm-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@crmpro.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - crm-db
    networks:
      - crm-network
    restart: unless-stopped

# ==========================================
# Volumes Persistentes
# ==========================================
volumes:
  crm-db-data:
  crm-redis-data:

# ==========================================
# Redes
# ==========================================
networks:
  crm-network:
    driver: bridge
